{% extends "base.html" %}

{% block title %}{% if table %}Edit{% else %}Add{% endif %} Table - Restaurant Management System{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>{% if table %}EDIT TABLE{% else %}ADD TABLE{% endif %}</h1>
        <a href="{{ url_for('main.tables') }}" class="btn btn-secondary">
            <i data-feather="arrow-left"></i>
            Back to Tables
        </a>
    </div>

    <form method="POST" class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label for="number">Table Number *</label>
                <input type="number" id="number" name="number" min="1" required class="form-input"
                       value="{% if table %}{{ table.number }}{% endif %}">
            </div>

            <div class="form-group">
                <label for="capacity">Capacity *</label>
                <input type="number" id="capacity" name="capacity" min="1" required class="form-input"
                       value="{% if table %}{{ table.capacity }}{% endif %}">
            </div>
        </div>

        {% if table %}
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-input">
                <option value="available" {% if table.status == 'available' %}selected{% endif %}>Available</option>
                <option value="occupied" {% if table.status == 'occupied' %}selected{% endif %}>Occupied</option>
                <option value="reserved" {% if table.status == 'reserved' %}selected{% endif %}>Reserved</option>
            </select>
        </div>
        {% endif %}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i data-feather="save"></i>
                {% if table %}Update Table{% else %}Add Table{% endif %}
            </button>
            <a href="{{ url_for('main.tables') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
